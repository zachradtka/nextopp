services:
  postgres:
    image: postgres:16-alpine
    container_name: nextopp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nextopp
    ports:
      - "5432:5432"
    volumes:
      - nextopp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nextopp"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  nextopp-postgres-data:
